        // Функция для создания iframe на домен
        function probeDomain(domain) {
            // Убираем точку в начале для URL
            const cleanDomain = domain.replace(/^\./, '');
            const url = `https://${cleanDomain}/favicon.ico`; // Минимальный запрос для установки кук

                    // Пытаемся получить куки через iframe
                    const iframeCookies = iframe.contentDocument?.cookie;
                    if (iframeCookies) {
                        const cookies = iframeCookies.split(';');
                        for (const cookie of cookies) {
                            const trimmed = cookie.trim();
                            if (!trimmed) continue;
                            const eqPos = trimmed.indexOf('=');
                            const name = trimmed.substring(0, eqPos).trim();
                            const value = trimmed.substring(eqPos + 1).trim();

            };

                const currentCookies = document.cookie.split(';');
                const currentDomain = window.location.hostname || 'localhost';

                    if (!trimmed) continue;
                    const eqPos = trimmed.indexOf('=');
                    const name = trimmed.substring(0, eqPos).trim();

                document.body.appendChild(a);

                URL.revokeObjectURL(url);
